services:
  postgres:
    image: postgres:15
    container_name: ch2d_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ch2d_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: ch2d_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  graphql-engine:
    image: hasura/graphql-engine:latest
    container_name: ch2d_graphql_engine
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: always
    environment:
      HASURA_GRAPHQL_METADATA_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ch2d_db
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_SECRET}
      # HASURA_GRAPHQL_JWT_SECRET: '{"type": "HS256", "key": "your-jwt-secret-key"}' # Uncomment once you add auth back and want JWT-based row-level permissions
      # HASURA_GRAPHQL_UNAUTHORIZED_ROLE: anonymous # Uncomment for anonymous public access

volumes:
  postgres_data:
